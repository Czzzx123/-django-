{% extends 'base.html' %}
{% block title%}
注册
{%endblock%}
{%block head%}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{%static 'js/register.js'%}"></script>
{%endblock%}
{%block main%}
<div style="max-width: 330px" class="m-auto">
    <h1>注册</h1>
    <form action="" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label for="username">用户名 </label>
            <input type="text" name="username" id="username" class="form-control" placeholder="用户名">
        </div>
        <div class="mb-3">
            <label for="email input">邮箱 </label>
            <input type="email" name="email" id="email input" class="form-control" placeholder="邮箱">
        </div>
        <div class="mb-3">
            <label for="captcha">验证码 </label>
            <div class="input-group mb-3">
                <input type="text" name="captcha" id="captcha" class="form-control" placeholder="验证码">
                <button class="btn btn-outline-secondary" type="button" id="captcha-btn">获取验证码</button>
            </div>
        </div>
        <div class="mb-3">
            <label for="password input">密码 </label>
            <input type="password" name="password" id="password input" class="form-control" placeholder="密码">
        </div>
        <div class="mb-3">
            <button class="btn btn-primary w-100">注册</button>
        </div>
    </form>
</div>
{%endblock%}
