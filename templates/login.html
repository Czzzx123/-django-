{% extends 'base.html' %}
{% block title%}
登录
{%endblock%}
{%block main%}
<div style="max-width: 330px" class="m-auto">
    <h1>登陆</h1>
    <form action="" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label for="email input">邮箱 </label>
            <input type="email" name="email" id="email input" class="form-control" placeholder="邮箱">
        </div>
        <div class="mb-3">
            <label for="password input">密码 </label>
            <input type="password" name="password" id="password input" class="form-control" placeholder="密码">
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input w" type="checkbox" name="remember" value="1" id="checkDefault">
            <label class="form-check-label" for="checkDefault">
                记住我
            </label>
        </div>

        <div class="mb-3">
            <button class="btn btn-primary w-100">立即登陆</button>
        </div>
    </form>
</div>
{%endblock%}
